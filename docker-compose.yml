services:
  postgres:
    image: postgres:16-alpine
    container_name: mochi-postgres
    environment:
      POSTGRES_DB: mochi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mochi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mochi"]
      interval: 5s
      timeout: 5s
      retries: 20

  identity-api:
    build:
      context: ./services/identity-api
    container_name: mochi-identity-api
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mochi
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

volumes:
  mochi-postgres-data: